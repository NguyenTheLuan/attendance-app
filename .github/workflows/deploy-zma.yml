name: Deploy Zalo Mini App

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "vite.config.ts"
      - ".env.zma"
      - "index.html"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for ZMA
        run: npx vite build --mode zma
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Fix app-config.json in build output and create zip archive
        run: |
          # zmp-vite-plugin generates www/app-config.json with empty pages array,
          # which fails ZMA validation. Copy the root config with proper pages.
          cp app-config.json www/app-config.json
          cd www
          zip -r ../attendance-app-zma.zip ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-app-zma
          path: attendance-app-zma.zip
          retention-days: 7
